name: Flutter iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Build iOS (unsigned)
        working-directory: iostennis
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Package IPA (completely unsigned)
        working-directory: iostennis
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -path "*iphoneos*" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build -name "Runner.app" || true
            exit 1
          fi

          echo "Found: $APP_PATH"

          # ============================================
          # 关键修复：彻底移除所有签名信息
          # ============================================
          # 黑屏根因：iOS 签名验证失败
          # - 之前对 Frameworks 做 ad-hoc 签名留下了签名信息
          # - 爱思助手只重签 Runner，不重签 Frameworks
          # - ad-hoc 签名和个人开发者签名的 Team ID 不同
          # - iOS 检测到签名不一致，拒绝加载 app
          #
          # 解决方案：完全不做任何预签名，让爱思助手对
          # Runner 和所有 Frameworks 统一签名，确保签名一致
          # ============================================

          echo "=== Step 1: Remove ALL code signatures from Runner.app ==="
          rm -rf "$APP_PATH/_CodeSignature"
          rm -f "$APP_PATH/embedded.mobileprovision"

          echo "=== Step 2: Remove ALL code signatures from Frameworks ==="
          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks"/*.framework; do
              if [ -d "$framework" ]; then
                FRAMEWORK_NAME=$(basename "$framework" .framework)
                echo "  Cleaning: $FRAMEWORK_NAME"
                rm -rf "$framework/_CodeSignature"
                # 不做任何 codesign 操作！
              fi
            done
            for dylib in "$APP_PATH/Frameworks"/*.dylib; do
              if [ -f "$dylib" ]; then
                echo "  Cleaning: $(basename "$dylib")"
                # dylib 没有独立的 _CodeSignature 目录
                # 但需要移除嵌入的签名（codesign --remove-signature）
                codesign --remove-signature "$dylib" 2>/dev/null || true
              fi
            done
          fi

          echo "=== Step 3: Remove signature from Runner binary itself ==="
          codesign --remove-signature "$APP_PATH/Runner" 2>/dev/null || true

          echo "=== Step 4: Verify no signatures remain ==="
          echo "--- Checking _CodeSignature directories ---"
          find "$APP_PATH" -name "_CodeSignature" -type d || echo "  (none found - GOOD)"
          echo "--- Checking code signatures ---"
          codesign -dv "$APP_PATH" 2>&1 || echo "  Runner.app: unsigned (GOOD)"
          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks"/*.framework; do
              if [ -d "$framework" ]; then
                FRAMEWORK_NAME=$(basename "$framework" .framework)
                codesign -dv "$framework/$FRAMEWORK_NAME" 2>&1 || echo "  $FRAMEWORK_NAME: unsigned (GOOD)"
              fi
            done
          fi

          echo "=== Step 5: Package IPA ==="
          mkdir -p /tmp/ipa_staging/Payload
          cp -Rf "$APP_PATH" /tmp/ipa_staging/Payload/Runner.app

          cd /tmp/ipa_staging
          zip --symlinks -r -q "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" Payload/ -x "*.DS_Store"

          echo "IPA created: $(du -h $GITHUB_WORKSPACE/iostennis/ACETrack.ipa | cut -f1)"

          echo "=== IPA contents summary ==="
          unzip -l "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" | grep -E "Frameworks/|_CodeSignature|\.dylib" | head -30

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ACETrack-ipa
          path: iostennis/ACETrack.ipa
