name: Flutter iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Build iOS framework (skip codesign)
        working-directory: iostennis
        run: |
          flutter pub get
          # 用 flutter build ios-framework 生成 Flutter 编译产物
          # 这不会检查签名
          flutter build ios-framework --no-codesign --release

      - name: Build Runner with xcodebuild
        working-directory: iostennis
        run: |
          # 先执行 pod install
          cd ios
          pod install
          cd ..

          # 用 xcodebuild 构建
          set -o pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build/derivedData \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            build 2>&1 | tee build_log.txt

      - name: Show build errors
        if: failure()
        working-directory: iostennis
        run: |
          echo "=== BUILD ERRORS ==="
          grep -E "error:|Error:|FAIL|ld:|clang:|PhaseScriptExecution" build_log.txt || echo "No specific errors found"
          echo "=== LAST 80 LINES ==="
          tail -80 build_log.txt

      - name: Package IPA
        if: success()
        working-directory: iostennis
        run: |
          APP_PATH=$(find build/derivedData -name "Runner.app" -path "*Release-iphoneos*" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build -name "Runner.app" || true
            exit 1
          fi

          echo "Found: $APP_PATH"

          # 清除签名
          rm -rf "$APP_PATH/_CodeSignature"
          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks"/*.framework; do
              if [ -d "$framework" ]; then
                rm -rf "$framework/_CodeSignature"
              fi
            done
            for dylib in "$APP_PATH/Frameworks"/*.dylib; do
              if [ -f "$dylib" ]; then
                codesign --remove-signature "$dylib" 2>/dev/null || true
              fi
            done
          fi

          # 打包 IPA
          mkdir -p /tmp/ipa_staging/Payload
          cp -r "$APP_PATH" /tmp/ipa_staging/Payload/

          cd /tmp/ipa_staging
          zip -r -q -x "*.DS_Store" "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" Payload/

          echo "IPA size: $(du -h $GITHUB_WORKSPACE/iostennis/ACETrack.ipa | cut -f1)"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ACETrack-ipa
          path: iostennis/ACETrack.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: iostennis/build_log.txt
