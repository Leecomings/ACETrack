name: Flutter iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build Flutter iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: iostennis
        run: |
          flutter pub get

      - name: Build iOS device app
        working-directory: iostennis
        run: |
          flutter clean
          flutter pub get
          cd ios
          pod install
          cd ..
          flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: iostennis
        run: |
          mkdir -p ios/Payload
          cp -r build/ios/iphoneos/Runner.app ios/Payload/
          zip -r ios/Runner.ipa ios/Payload/

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: iostennis/ios/Runner.ipa
