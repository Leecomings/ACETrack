name: Flutter iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Build iOS
        working-directory: iostennis
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Package IPA with ad-hoc signing
        working-directory: iostennis
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -path "*iphoneos*" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build -name "Runner.app" || true
            exit 1
          fi

          echo "Found: $APP_PATH"

          # 对所有 Frameworks 执行 ad-hoc 签名（关键步骤！）
          # iOS 要求所有可执行代码必须有有效签名才能加载
          # ad-hoc 签名 (-) 让 iOS 允许加载这些 dylib
          if [ -d "$APP_PATH/Frameworks" ]; then
            echo "=== Ad-hoc signing Frameworks ==="
            for framework in "$APP_PATH/Frameworks"/*.framework; do
              if [ -d "$framework" ]; then
                FRAMEWORK_NAME=$(basename "$framework" .framework)
                FRAMEWORK_EXECUTABLE="$framework/$FRAMEWORK_NAME"
                if [ -f "$FRAMEWORK_EXECUTABLE" ]; then
                  echo "Signing: $FRAMEWORK_NAME"
                  codesign --force --sign - "$FRAMEWORK_EXECUTABLE"
                fi
              fi
            done
            for dylib in "$APP_PATH/Frameworks"/*.dylib; do
              if [ -f "$dylib" ]; then
                echo "Signing: $(basename "$dylib")"
                codesign --force --sign - "$dylib"
              fi
            done
          fi

          # 对主可执行文件也做 ad-hoc 签名
          echo "Signing main executable"
          codesign --force --sign - "$APP_PATH/Runner"

          # 验证签名
          echo "=== Verifying signatures ==="
          codesign --verify --deep --verbose=2 "$APP_PATH" 2>&1 || true

          # 打包 IPA
          mkdir -p /tmp/ipa_staging/Payload
          cp -r "$APP_PATH" /tmp/ipa_staging/Payload/Runner.app

          cd /tmp/ipa_staging
          zip -r -q "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" Payload/ -x "*.DS_Store"

          echo "IPA size: $(du -h $GITHUB_WORKSPACE/iostennis/ACETrack.ipa | cut -f1)"

          # 列出 Frameworks 内容
          echo "=== Frameworks in IPA ==="
          unzip -l "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" | grep "Frameworks/" | head -20

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ACETrack-ipa
          path: iostennis/ACETrack.ipa
