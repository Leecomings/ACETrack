name: Flutter iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Build iOS
        working-directory: iostennis
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Package IPA (unsigned, for third-party resigning)
        working-directory: iostennis
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -path "*iphoneos*" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build -name "Runner.app" || true
            exit 1
          fi

          echo "Found: $APP_PATH"

          # === 关键：彻底删除所有签名信息 ===
          # 爱思助手重签名后会修改 Runner 二进制，
          # 如果 CodeResources 中的 hash 与修改后的二进制不匹配，
          # iOS 会拒绝加载 app 导致黑屏。
          # 解决方案：不预签名，让爱思助手从零签名并生成正确的 CodeResources。

          echo "=== Removing ALL code signatures ==="
          # 删除主 app 的签名
          rm -rf "$APP_PATH/_CodeSignature"
          # 删除 embedded.mobileprovision（如果有的话）
          rm -f "$APP_PATH/embedded.mobileprovision"

          # 对 Frameworks 做 ad-hoc 签名（爱思助手不会重新签名 Frameworks）
          # 但也要删除 CodeResources，因为 ad-hoc 签名和爱思助手的签名团队不同
          if [ -d "$APP_PATH/Frameworks" ]; then
            echo "=== Ad-hoc signing Frameworks ==="
            for framework in "$APP_PATH/Frameworks"/*.framework; do
              if [ -d "$framework" ]; then
                FRAMEWORK_NAME=$(basename "$framework" .framework)
                FRAMEWORK_EXECUTABLE="$framework/$FRAMEWORK_NAME"
                if [ -f "$FRAMEWORK_EXECUTABLE" ]; then
                  rm -rf "$framework/_CodeSignature"
                  echo "Signing: $FRAMEWORK_NAME"
                  codesign --force --sign - --timestamp=none "$FRAMEWORK_EXECUTABLE"
                fi
              fi
            done
            for dylib in "$APP_PATH/Frameworks"/*.dylib; do
              if [ -f "$dylib" ]; then
                echo "Signing: $(basename "$dylib")"
                codesign --force --sign - --timestamp=none "$dylib"
              fi
            done
          fi

          # 注意：不对 Runner 主可执行文件签名！
          # 不对整个 Runner.app 签名！
          # 让爱思助手完成主 app 的签名和 CodeResources 生成

          # 确保 Info.plist 中 Bundle ID 是纯的（不含 team ID 后缀）
          echo "=== Checking Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist" 2>&1 || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>&1 || true

          # 打包 IPA
          mkdir -p /tmp/ipa_staging/Payload
          cp -Rf "$APP_PATH" /tmp/ipa_staging/Payload/Runner.app

          cd /tmp/ipa_staging
          zip --symlinks -r -q "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" Payload/ -x "*.DS_Store"

          echo "IPA size: $(du -h $GITHUB_WORKSPACE/iostennis/ACETrack.ipa | cut -f1)"

          # 列出内容
          echo "=== Frameworks in IPA ==="
          unzip -l "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" | grep "Frameworks/" | head -20

          echo "=== Code signatures in IPA ==="
          unzip -l "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" | grep "_CodeSignature" | head -20

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ACETrack-ipa
          path: iostennis/ACETrack.ipa
