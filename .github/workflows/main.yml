name: Flutter iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: iostennis
        run: flutter pub get

      - name: Build iOS with xcodebuild (skip codesign)
        working-directory: iostennis
        run: |
          # Step 1: 生成 Dart 编译产物
          flutter build ios --config-only --release
          
          # Step 2: pod install
          cd ios
          pod install
          cd ..
          
          # Step 3: 用 xcodebuild 构建，完全跳过签名
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build/derivedData \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package IPA
        working-directory: iostennis
        run: |
          # 查找 Runner.app
          APP_PATH=$(find build/derivedData -name "Runner.app" -path "*Release-iphoneos*" | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build -name "Runner.app" || true
            exit 1
          fi
          
          echo "Found: $APP_PATH"
          
          # 打包为 IPA
          mkdir -p /tmp/payload/Payload
          cp -r "$APP_PATH" /tmp/payload/Payload/
          cd /tmp/payload
          zip -r -q "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" Payload/
          
          echo "IPA size: $(du -h $GITHUB_WORKSPACE/iostennis/ACETrack.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACETrack-ipa
          path: iostennis/ACETrack.ipa
