name: Flutter iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Prepare dependencies
        working-directory: iostennis
        run: |
          flutter pub get
          cd ios
          pod install

      - name: Archive with xcodebuild (skip codesign)
        working-directory: iostennis/ios
        run: |
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -archivePath ../build/Runner.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee ../build_log.txt

      - name: Show build errors
        if: failure()
        working-directory: iostennis
        run: |
          echo "=== BUILD ERRORS ==="
          grep -E "error:|Error:|FAIL|ld:|clang:" build_log.txt || echo "No specific errors found"
          echo "=== LAST 50 LINES ==="
          tail -50 build_log.txt

      - name: Package IPA from archive
        if: success()
        working-directory: iostennis
        run: |
          # 从 xcarchive 中提取 Runner.app
          APP_PATH="build/Runner.xcarchive/Products/Applications/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found in archive!"
            find build -name "Runner.app" || true
            exit 1
          fi

          echo "Found: $APP_PATH"

          # 验证
          echo "=== Runner.app contents ==="
          ls -la "$APP_PATH/" | head -20
          echo ""
          file "$APP_PATH/Runner" || echo "Runner binary check failed"

          # 打包 IPA
          mkdir -p /tmp/ipa_staging/Payload
          cp -r "$APP_PATH" /tmp/ipa_staging/Payload/

          cd /tmp/ipa_staging
          zip -r -q -x "*.DS_Store" "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" Payload/

          echo "IPA size: $(du -h $GITHUB_WORKSPACE/iostennis/ACETrack.ipa | cut -f1)"

          # 验证
          echo ""
          echo "=== IPA contents (first 30) ==="
          unzip -l "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" | head -30

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ACETrack-ipa
          path: iostennis/ACETrack.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: iostennis/build_log.txt
