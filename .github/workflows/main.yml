name: Flutter iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create temporary signing keychain
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="acetrack123"
          P12_PASSWORD="acetrack456"

          # 创建 keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 创建自签名证书（使用 PLACEHOLDER 作为 Team ID）
          openssl req -x509 -newkey rsa:2048 -keyout "$RUNNER_TEMP/key.pem" -out "$RUNNER_TEMP/cert.pem" \
            -days 365 -nodes -subj "/CN=ACETrack Development/O=PLACEHOLDER"
          openssl pkcs12 -export -out "$RUNNER_TEMP/certificate.p12" \
            -inkey "$RUNNER_TEMP/key.pem" -in "$RUNNER_TEMP/cert.pem" -password "pass:$P12_PASSWORD"
          security import "$RUNNER_TEMP/certificate.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build iOS with flutter
        working-directory: iostennis
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: iostennis
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -path "*iphoneos*" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build -name "Runner.app" || true
            exit 1
          fi

          echo "Found: $APP_PATH"

          # 清除签名 (爱思助手会重新签名)
          rm -rf "$APP_PATH/_CodeSignature"
          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks"/*.framework; do
              if [ -d "$framework" ]; then
                rm -rf "$framework/_CodeSignature"
              fi
            done
            for dylib in "$APP_PATH/Frameworks"/*.dylib; do
              if [ -f "$dylib" ]; then
                codesign --remove-signature "$dylib" 2>/dev/null || true
              fi
            done
          fi

          # 打包 IPA
          mkdir -p /tmp/ipa_staging/Payload
          cp -r "$APP_PATH" /tmp/ipa_staging/Payload/

          cd /tmp/ipa_staging
          zip -r -q -x "*.DS_Store" "$GITHUB_WORKSPACE/iostennis/ACETrack.ipa" Payload/

          echo "IPA size: $(du -h $GITHUB_WORKSPACE/iostennis/ACETrack.ipa | cut -f1)"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ACETrack-ipa
          path: iostennis/ACETrack.ipa

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
